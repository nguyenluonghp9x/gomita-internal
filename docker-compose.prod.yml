services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gomita_internal}
      POSTGRES_USER: ${POSTGRES_USER:-gomita}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gomita} -d ${POSTGRES_DB:-gomita_internal}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gomita}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-gomita_internal}?schema=public
      NODE_ENV: production
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8

volumes:
  pg_data:
