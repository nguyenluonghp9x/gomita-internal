name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  quality:
    name: Lint and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  smoke:
    name: Smoke API
    needs: quality
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gomita_internal
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d gomita_internal"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/gomita_internal?schema=public
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXTAUTH_SECRET: ci-smoke-secret
      SESSION_MAX_AGE_SECONDS: "28800"
      SESSION_UPDATE_AGE_SECONDS: "300"
      DOCUMENT_MAX_UPLOAD_BYTES: "26214400"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Start app
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for health endpoint
        run: |
          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:3000/api/health" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "App failed to become healthy in time"
          cat app.log || true
          exit 1

      - name: Run smoke checks
        run: APP_BASE_URL=http://127.0.0.1:3000 npm run smoke:api

      - name: Stop app
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi
